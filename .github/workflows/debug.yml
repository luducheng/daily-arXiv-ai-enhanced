# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: debug-daily-arXiv

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Fetch existing data branch files
      run: |
        echo "Fetching existing data branch files..."

        # Fetch data branch
        git fetch origin data:data

        # Copy existing data branch files into current workspace
        git checkout data -- data 

    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")
        
    - name: Update file list
      run: |
        echo "更新文件列表... / Updating file list..."
        ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt
        echo "文件列表更新完成 / File list updated"

    - name: Generate password hash and inject into config
      run: |
        echo "🔐 Generating password hash for authentication..."

        PASSWORD="${{ secrets.ACCESS_PASSWORD }}"

        if [ -z "$PASSWORD" ]; then
          echo "⚠️  WARNING: ACCESS_PASSWORD not set in Secrets"
          echo "⚠️  Password protection will be DISABLED"
          echo "⚠️  To enable password protection, add ACCESS_PASSWORD in repository Secrets"
          echo "ℹ️  Website will remain publicly accessible without authentication"

          # Use a special value that will disable authentication
          PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
        else
          # Generate SHA-256 hash using openssl
          PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
          echo "✅ Password hash generated successfully"
          echo "✅ Hash length: ${#PASSWORD_HASH} characters"
          echo "🔐 Password protection is ENABLED"
        fi

        # Inject hash into auth-config.js
        if [ -f "js/auth-config.js" ]; then
          sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
          echo "✅ Password hash injected into js/auth-config.js"
        else
          echo "❌ ERROR: js/auth-config.js not found!"
          exit 1
        fi

        echo "🔐 Authentication setup complete"

    - name: Prepare data files for data branch
      run: |
        echo "准备数据文件... / Preparing data files..."
        today=${{ steps.crawl_step.outputs.crawl_date }}
        
        # 创建临时目录保存数据文件 / Create temporary directory to save data files
        mkdir -p /tmp/data_files/data
        mkdir -p /tmp/data_files/assets
        
        # 复制数据文件到临时目录 / Copy data files to temporary directory
        cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
        cp assets/file-list.txt /tmp/data_files/assets/ 2>/dev/null || true
        
        echo "数据文件已保存到临时目录 / Data files saved to temporary directory"

    - name: Setup and commit to data branch
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        
        echo "设置 data 分支... / Setting up data branch..."
        today=${{ steps.crawl_step.outputs.crawl_date }}
        
        # 在切换分支前，清理工作目录中可能冲突的未跟踪文件
        # Before switching branches, clean untracked files that might conflict
        # 这些文件已经保存到临时目录，所以可以安全删除
        # These files are already saved to temporary directory, so safe to remove
        rm -rf data/*.jsonl 2>/dev/null || true
        rm -f data/*.md 2>/dev/null || true
        rm -f assets/file-list.txt 2>/dev/null || true
        
        # 检查 data 分支是否存在 / Check if data branch exists
        if git ls-remote --heads origin data | grep -q data; then
          echo "data 分支已存在，切换到 data 分支 / Data branch exists, switching to data branch"
          git fetch origin data:data
          git checkout data
          git pull origin data || true
        else
          echo "data 分支不存在，创建新分支 / Data branch does not exist, creating new branch"
          # 创建空的 data 分支 / Create empty data branch
          git checkout --orphan data
          git rm -rf --cached . 2>/dev/null || true
          # 确保 data 和 assets 目录存在 / Ensure data and assets directories exist
          mkdir -p data assets
          echo "# Data Branch" > README.md
          git add README.md
          git commit -m "chore: initialize data branch"
          git push origin data
        fi
        
        # 从临时目录恢复数据文件 / Restore data files from temporary directory
        # 确保目录存在 / Ensure directories exist
        mkdir -p data assets
        cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
        cp /tmp/data_files/assets/file-list.txt assets/ 2>/dev/null || true
        
        # 只添加数据文件 / Only add data files
        git add data/* 2>/dev/null || true
        git add assets/file-list.txt 2>/dev/null || true
        
        # 检查是否有数据变更需要提交 / Check if there are data changes to commit
        if git diff --staged --quiet; then
          echo "没有数据变更需要提交 / No data changes to commit"
        else
          git commit -m "update: $today arXiv papers"
          echo "数据变更已提交到 data 分支 / Data changes committed to data branch"
        fi

    - name: Push data changes to data branch
      run: |
        # 设置Git配置以处理自动合并 / Set Git config for automatic merging
        git config pull.rebase true
        git config rebase.autoStash true
        
        # 尝试推送数据变更到 data 分支 / Try to push data changes to data branch
        for i in {1..3}; do
          echo "推送数据变更尝试 $i / Push data changes attempt $i"
          if git push origin data; then
            echo "数据变更推送成功 / Data changes pushed successfully"
            break
          else
            echo "推送失败，拉取最新变更... / Push failed, pulling latest changes..."
            git pull origin data --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败 / Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done
